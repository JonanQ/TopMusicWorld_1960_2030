<script>
  async function checkAllEmbedsAndRemove() {
    const anchors = Array.from(document.querySelectorAll('#songList a'));
    for (const a of anchors) {
      const m = a.getAttribute('onclick')?.match(/loadVideo\('([^']+)'/);
      if (!m) continue;
      const id = m[1];

      // Pequeño retraso para no saturar a YouTube
      await new Promise(r => setTimeout(r, 150));

      const url = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`;
      let ok = false;
      try {
        const res = await fetch(url, { method: 'GET' });
        ok = res.ok;
      } catch {
        ok = false;
      }

      // Si no es embebible, eliminamos el <li>
      if (!ok) {
        const li = a.closest('li');
        if (li) li.remove();
      }
    }
  }

  document.addEventListener('DOMContentLoaded', checkAllEmbedsAndRemove);
</script>
